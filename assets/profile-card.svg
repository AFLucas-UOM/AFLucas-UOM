<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:ns1="http://www.w3.org/1999/xlink" width="1100" height="692" viewBox="0 0 1100 692" role="img" aria-labelledby="title desc">
  <title id="title">Andrea Filiberto Lucas GitHub profile terminal card</title>
  <desc id="desc">A terminal-style profile card using the supplied portrait, research interests, contact information and GitHub statistics.</desc>
  <defs>
    <clipPath id="portraitClip"><rect x="24" y="48" width="350" height="500" rx="16" /></clipPath>
    <linearGradient id="portraitFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="68%" class="fade-start" />
      <stop offset="100%" class="fade-end" />
    </linearGradient>
  </defs>
  <style>
    @font-face {
      font-family: "ConsolasFallback";
      src: local("Consolas"), local("Menlo"), local("Monaco"), local("Liberation Mono");
      font-display: swap;
    }
    text, tspan { white-space: pre; }
    .frame { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
    .titlebar { fill: #ffffff; }
    .header, .section, .portrait-name, .stats, .row { fill: #24292f; }
    .prompt { fill: #1a7f37; }
    .key { fill: #953800; }
    .value { fill: #0969da; }
    .muted, .portrait-meta { fill: #6e7781; }
    .rule { stroke: #d0d7de; stroke-width: 1; }
    .stats-bg { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
    .photo-border { fill: none; stroke: #d0d7de; stroke-width: 1.5; }
    .fade-start { stop-color: #ffffff; stop-opacity: 0; }
    .fade-end { stop-color: #ffffff; stop-opacity: 0.78; }

    .header { font: 700 16px "ConsolasFallback", Consolas, monospace; }
    .row { font: 15px "ConsolasFallback", Consolas, monospace; }
    .value { font: 15px "ConsolasFallback", Consolas, monospace; }
    .value.small { font-size: 13.5px; }
    .section { font: 700 15px "ConsolasFallback", Consolas, monospace; }
    .stats { font: 14px "ConsolasFallback", Consolas, monospace; }
    .portrait-name { font: 700 18px "ConsolasFallback", Consolas, monospace; }
    .portrait-meta { font: 13px "ConsolasFallback", Consolas, monospace; }

    @media (prefers-color-scheme: dark) {
      .frame { fill: #161b22; stroke: #30363d; }
      .titlebar { fill: #0d1117; }
      .header, .section, .portrait-name, .stats, .row { fill: #c9d1d9; }
      .prompt { fill: #3fb950; }
      .key { fill: #ffa657; }
      .value { fill: #a5d6ff; }
      .muted, .portrait-meta { fill: #7d8590; }
      .rule { stroke: #30363d; }
      .stats-bg { fill: #0d1117; stroke: #30363d; }
      .photo-border { stroke: #30363d; }
      .fade-start { stop-color: #0d1117; }
      .fade-end { stop-color: #0d1117; }
    }
  </style>

  <rect x="1" y="1" width="1098" height="690" rx="16" class="frame" />
  <rect x="1" y="1" width="1098" height="28" rx="16" class="titlebar" />
  <rect x="1" y="15" width="1098" height="14" class="titlebar" />
  <circle cx="18" cy="15" r="5" fill="#ff5f56" />
  <circle cx="36" cy="15" r="5" fill="#ffbd2e" />
  <circle cx="54" cy="15" r="5" fill="#27c93f" />
  <text x="550" y="19" text-anchor="middle" class="muted" style="font: 12px Consolas, monospace;">AFLucas-UOM — profile</text>

  <image x="24" y="48" width="350" height="500" preserveAspectRatio="xMidYMid slice" clip-path="url(#portraitClip)" ns1:href="data:image/jpeg;base64," />
  <rect x="24" y="48" width="350" height="500" rx="16" class="photo-border" />
  <rect x="24" y="48" width="350" height="500" rx="16" fill="url(#portraitFade)" />
