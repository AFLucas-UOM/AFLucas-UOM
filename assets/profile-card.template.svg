<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">Andrea Filiberto Lucas GitHub profile terminal card</title>
  <desc id="desc">A clean macOS Terminal-inspired GitHub profile card with portrait, overview, research, contact details and GitHub statistics.</desc>

  <defs>
    <clipPath id="portraitClip">
      <rect x="28" y="66" width="300" height="400" rx="12"/>
    </clipPath>
  </defs>

  <style>
    @font-face {
      font-family: "TerminalMono";
      src: local("SFMono-Regular"), local("SF Mono"), local("Menlo"), local("Monaco"), local("Consolas"), local("Liberation Mono");
      font-display: swap;
    }

    text, tspan { white-space: pre; }

    .bg { fill: #0d1117; }
    .window { fill: #0b1220; stroke: #30363d; stroke-width: 1.4; }
    .titlebar { fill: #161b22; }
    .divider { stroke: #30363d; stroke-width: 1; }

    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }

    .title {
      font: 600 13px "TerminalMono", monospace;
      fill: #c9d1d9;
    }

    .portrait-stroke {
      fill: none;
      stroke: #30363d;
      stroke-width: 1.2;
    }

    .info-box,
    .stats-box {
      fill: #111827;
      stroke: #30363d;
      stroke-width: 1.1;
    }

    .left-name {
      font: 700 21px "Segoe UI", Arial, sans-serif;
      fill: #f0f6fc;
    }

    .left-role {
      font: 600 15px "Segoe UI", Arial, sans-serif;
      fill: #d2a8ff;
    }

    .left-meta {
      font: 500 13.5px "Segoe UI", Arial, sans-serif;
      fill: #c9d1d9;
    }

    .left-link {
      font: 600 14px "TerminalMono", monospace;
      fill: #a5d6ff;
    }

    .section {
      font: 700 17px "TerminalMono", monospace;
      fill: #f0f6fc;
    }

    .row {
      font: 14px "TerminalMono", monospace;
    }

    .key {
      fill: #ffa657;
      font-weight: 700;
    }

    .dots {
      fill: #6e7681;
    }

    .row-value {
      fill: #a5d6ff;
    }
  </style>

  <rect width="1100" height="680" class="bg"/>
  <rect x="10" y="10" width="1080" height="660" rx="14" class="window"/>

  <!-- macOS-style title bar: rounded only at the top -->
  <rect x="10" y="10" width="1080" height="40" rx="14" class="titlebar"/>
  <rect x="10" y="34" width="1080" height="16" class="titlebar"/>
  <line x1="10" y1="50" x2="1090" y2="50" class="divider"/>

  <circle cx="32" cy="30" r="4.5" class="dot-red"/>
  <circle cx="47" cy="30" r="4.5" class="dot-yellow"/>
  <circle cx="62" cy="30" r="4.5" class="dot-green"/>
  <text x="550" y="34" text-anchor="middle" class="title">fili@aflucas.com</text>

  <!-- portrait; original background is preserved -->
  <image x="28" y="66" width="300" height="400" preserveAspectRatio="xMidYMid slice" clip-path="url(#portraitClip)" xlink:href="{{PROFILE_IMAGE_DATA_URI}}"/>
  <rect x="28" y="66" width="300" height="400" rx="12" class="portrait-stroke"/>

  <!-- compact identity panel -->
  <rect x="28" y="478" width="300" height="160" rx="12" class="info-box"/>
  <text x="42" y="513" class="left-name">Andrea Filiberto Lucas</text>
  <text x="42" y="538" class="left-role">AI Researcher &amp; Developer</text>
  <text x="42" y="578" class="left-meta">University of Malta · Dept. of AI</text>
  <text x="42" y="606" class="left-link">web://aflucas.com</text>

  <!-- terminal content -->
  <text x="356" y="86" class="section">Overview</text>
  {{OVERVIEW_ROWS}}

  <text x="356" y="304" class="section">Research</text>
  {{RESEARCH_ROWS}}

  <text x="356" y="422" class="section">Contact</text>
  {{CONTACT_ROWS}}

  <text x="356" y="540" class="section">GitHub Stats</text>
  <rect x="356" y="554" width="646" height="76" rx="10" class="stats-box"/>
  {{STATS_ROWS}}
</svg>
