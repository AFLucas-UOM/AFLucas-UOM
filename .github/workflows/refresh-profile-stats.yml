name: Refresh profile statistics

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/update_profile_stats.py"
      - ".github/profile-image.hex.part*"
      - ".github/workflows/refresh-profile-stats.yml"
      - "assets/profile-card.template.svg"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build profile card and refresh statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: AFLucas-UOM
        run: python .github/scripts/update_profile_stats.py

      - name: Commit generated profile assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-card.svg assets/profile-photo.jpg

          if git diff --cached --quiet; then
            echo "Profile card and statistics are already current."
          else
            git commit -m "chore: refresh profile card and statistics [skip ci]"
            git push
          fi
